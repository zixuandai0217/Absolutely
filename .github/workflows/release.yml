name: Release VSIX

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate theme
        run: npm run validate

      - name: Package VSIX
        run: npm run package

      - name: Write release notes
        run: |
          {
            echo "Absolutely Theme ${GITHUB_REF_NAME}"
            echo
            echo "- VS Code-compatible Absolutely Light and Absolutely Dark themes."
            echo "- Codex App Absolutely source colors are locked by validation."
            echo "- VSIX package is attached below for local installation."
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" absolutely-theme-0.1.0.vsix \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Absolutely Theme ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
